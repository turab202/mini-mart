<app-navbar></app-navbar>

<main class="bg-cream min-h-screen">
  <!-- Hero Section -->
  <section class="bg-teal-800 text-white relative overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 py-24 text-center">
      <h1 class="font-montserrat text-5xl md:text-7xl font-bold mb-4">
        Fresh <span class="text-coral">Goods</span><br />Delivered to Your Door
      </h1>
      <p class="font-poppins text-lg max-w-2xl mx-auto mb-8 opacity-90">
        Shop quality products at amazing prices. Fast delivery across the city.
      </p>
      <button routerLink="/products" class="bg-coral px-8 py-3 rounded-full font-poppins font-semibold hover:bg-opacity-90 transition">
        Shop Now →
      </button>
    </div>
    <div class="absolute bottom-0 left-0 w-full">
      <svg viewBox="0 0 1440 120" class="w-full h-16">
        <path fill="#FFF9F5" d="M0,80 C120,100 240,120 360,110 C480,100 600,60 720,50 C840,40 960,60 1080,75 C1200,90 1320,100 1440,90 L1440,120 L0,120 Z"/>
      </svg>
    </div>
  </section>

  <!-- Featured Products -->
  <section class="py-16">
    <div class="max-w-7xl mx-auto px-4">
      <h2 class="font-montserrat text-3xl font-bold text-center text-charcoal mb-4">Featured Products</h2>
      <div class="w-20 h-1 bg-coral mx-auto mb-12"></div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div *ngFor="let product of featuredProducts" class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition cursor-pointer" (click)="viewProduct(product._id)">
          <img [src]="product.images?.[0] || 'https://placehold.co/400x300?text=No+Image'" class="w-full h-48 object-cover">
          <div class="p-4">
            <h3 class="font-montserrat font-semibold text-charcoal">{{ product.name }}</h3>
            <p class="font-poppins text-sm text-gray-500 mt-1">{{ product.category }}</p>
            <div class="flex items-center justify-between mt-3">
              <span class="font-poppins font-bold text-teal-600">{{ product.price }} ETB</span>
              <button (click)="$event.stopPropagation(); addToCart(product)" class="bg-coral text-white px-3 py-1 rounded-full text-sm hover:bg-opacity-90">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<app-footer></app-footer>
